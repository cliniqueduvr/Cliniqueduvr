media:
  input: public/images
  output: /images

content:
  - name: services
    label: Services (FR)
    type: file
    path: src/data/services.json
    fields:
      - name: id
        label: ID
        type: number
      - name: title
        label: Titre
        type: string
      - name: icon
        label: Icone (classe FontAwesome)
        type: string
      - name: description
        label: Description courte
        type: string
      - name: details
        label: Details complets
        type: text

  - name: services_en
    label: Services (EN)
    type: file
    path: src/data/services-en.json
    fields:
      - name: id
        label: ID
        type: number
      - name: title
        label: Title
        type: string
      - name: icon
        label: Icon (FontAwesome class)
        type: string
      - name: description
        label: Short description
        type: string
      - name: details
        label: Full details
        type: text

  - name: projects
    label: Realisations (FR)
    type: file
    path: src/data/projects.json
    fields:
      - name: id
        label: ID
        type: number
      - name: title
        label: Titre
        type: string
      - name: location
        label: Localisation
        type: string
      - name: category
        label: Categorie
        type: string
      - name: beforeImage
        label: Image Avant
        type: image
      - name: afterImage
        label: Image Apres
        type: image
      - name: beforeAlt
        label: Texte alternatif Avant
        type: string
      - name: afterAlt
        label: Texte alternatif Apres
        type: string
      - name: description
        label: Description
        type: text

  - name: projects_en
    label: Realisations (EN)
    type: file
    path: src/data/projects-en.json
    fields:
      - name: id
        label: ID
        type: number
      - name: title
        label: Title
        type: string
      - name: location
        label: Location
        type: string
      - name: category
        label: Category
        type: string
      - name: beforeImage
        label: Before Image
        type: image
      - name: afterImage
        label: After Image
        type: image
      - name: beforeAlt
        label: Before Alt Text
        type: string
      - name: afterAlt
        label: After Alt Text
        type: string
      - name: description
        label: Description
        type: text