<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>Netlify Forms Blueprint</title>
  </head>
  <body>
    <form name="contact-fr" method="POST" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data">
      <input type="hidden" name="form-name" value="contact-fr">
      <input type="text" name="bot-field">
      <input type="text" name="Nom complet">
      <input type="email" name="Courriel">
      <input type="text" name="Téléphone">
      <input type="text" name="Services demandés">
      <input type="text" name="Type d’intervention">
      <input type="text" name="Adresse des travaux">
      <input type="text" name="Marque et année du VR">
      <input type="text" name="Numéro de série">
      <input type="file" name="Pièce jointe">
      <textarea name="Message"></textarea>
      <input type="text" name="Page">
    </form>

    <form name="contact-en" method="POST" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data">
      <input type="hidden" name="form-name" value="contact-en">
      <input type="text" name="bot-field">
      <input type="text" name="Full name">
      <input type="email" name="Email">
      <input type="text" name="Phone">
      <input type="text" name="Requested services">
      <input type="text" name="Type of work">
      <input type="text" name="Work address">
      <input type="text" name="RV make and year">
      <input type="text" name="Serial number">
      <input type="file" name="Attachment">
      <textarea name="Message"></textarea>
      <input type="text" name="Page">
    </form>

    <form name="home-contact-fr" method="POST" data-netlify="true" netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="home-contact-fr">
      <input type="text" name="bot-field">
      <input type="text" name="Nom complet">
      <input type="email" name="Courriel">
      <input type="text" name="Sujet">
      <textarea name="Message"></textarea>
      <input type="text" name="Page">
    </form>

    <form name="home-contact-en" method="POST" data-netlify="true" netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="home-contact-en">
      <input type="text" name="bot-field">
      <input type="text" name="Full name">
      <input type="email" name="Email">
      <input type="text" name="Subject">
      <textarea name="Message"></textarea>
      <input type="text" name="Page">
    </form>
  </body>
</html>
